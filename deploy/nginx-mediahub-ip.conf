# Доступ лише за IP сервера (без домену) — HTTP, без Let's Encrypt.
# /etc/nginx/sites-available/mediahub → symlink у sites-enabled
#
# sudo cp deploy/nginx-mediahub-ip.conf /etc/nginx/sites-available/mediahub
# sudo ln -sf /etc/nginx/sites-available/mediahub /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# sudo ufw allow 80/tcp && sudo ufw reload

upstream mediahub_admin {
    server 127.0.0.1:8765;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://mediahub_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        client_max_body_size 20m;
    }
}
