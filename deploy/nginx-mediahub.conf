# Сайт-проксі для адмінки. Покласти в /etc/nginx/sites-available/mediahub
# і зробити symlink у sites-enabled; certbot --nginx -d ваш.домен

upstream mediahub_admin {
    server 127.0.0.1:8765;
    keepalive 8;
}

server {
    listen 80;
    server_name ваш.домен.example;

    location / {
        proxy_pass http://mediahub_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        client_max_body_size 20m;
    }
}
