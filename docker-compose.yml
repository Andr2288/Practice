# Деплой на одному сервері: порти лише на localhost — зовнішній доступ через nginx на хості.
# cp .env.example .env && відредагувати секрети та MEDIAHUB_ADMIN_HOST.
#
# ОБОВʼЯЗКОВО на хості мають існувати як ФАЙЛИ (інакше Docker створить каталоги):
#   touch channels.txt youtube_stream_key.txt telegram_stream_key.txt x_stream_key.txt
#   touch youtube_cookies.txt   # потім ЗАМІНІТИ на експорт куків Netscape з браузера (порожній не рятує від «not a bot»)
# Ключі з адмінки пишуться у stream_key файли; youtube_cookies — лише з ПК (див. DEPLOY.md).

services:
  mediahub:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MEDIAHUB_ADMIN_HOST: ${MEDIAHUB_ADMIN_HOST:-0.0.0.0}
      MEDIAHUB_ADMIN_PORT: ${MEDIAHUB_ADMIN_PORT:-8765}
    volumes:
      - mediahub_state:/app/state
      - ./channels.txt:/app/channels.txt
      - ./youtube_stream_key.txt:/app/youtube_stream_key.txt
      - ./telegram_stream_key.txt:/app/telegram_stream_key.txt
      - ./x_stream_key.txt:/app/x_stream_key.txt
      - ./youtube_cookies.txt:/app/youtube_cookies.txt
    ports:
      - "0.0.0.0:8080:8765"

volumes:
  mediahub_state:
